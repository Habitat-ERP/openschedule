name: Changeset

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ensure:
    if: github.event_name == 'push' || (github.event.pull_request.title != 'Version Packages' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - run: git fetch origin main --depth=1
        if: github.event_name == 'pull_request'

      - run: node scripts/ensure-changeset.mjs
        env:
          CHANGESET_BASE: ${{ github.event_name == 'push' && github.event.before || 'origin/main' }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset
          if ! git diff --cached --quiet; then
            git commit -m "Add changeset"
            git push
          fi
